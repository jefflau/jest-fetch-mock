version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5
    ignore:
      # cross-fetch is the runtime fallback dep, deliberately held at 3.x;
      # other majors arrive as PRs again now the toolchain is current (#273)
      - dependency-name: cross-fetch
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
