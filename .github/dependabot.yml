version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5
    ignore:
      # majors are migrated deliberately, not via bot PRs: cross-fetch is a
      # runtime dep pinned to 3.x for the 3.x line (v4 drops it entirely),
      # and toolchain majors (eslint flat config, jest, typescript) need
      # accompanying config work
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
